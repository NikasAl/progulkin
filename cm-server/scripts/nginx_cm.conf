# ==============================================================================
# NGINX Configuration для CM Server
# Добавить в /etc/nginx/sites-enabled/react-dev
# ==============================================================================
#
# Скопировать содержимое location /cm/ в существующий конфиг
#
# Пример:
# server {
#     listen 443 ssl;
#     server_name kreagenium.ru;
#     ...
#
#     # Добавить этот блок:
#     location /cm/ {
#         proxy_pass http://127.0.0.1:8002/;
#         proxy_http_version 1.1;
#
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#
#         # Для signaling (WebSocket)
#         proxy_set_header Upgrade $http_upgrade;
#         proxy_set_header Connection "upgrade";
#
#         # Отключаем буферизацию для API
#         proxy_buffering off;
#         proxy_request_buffering off;
#
#         # Таймауты (стандартные для API без долгих запросов)
#         proxy_read_timeout 30s;
#         proxy_connect_timeout 10s;
#         proxy_send_timeout 30s;
#     }
# }
# ==============================================================================

location /cm/ {
    proxy_pass http://127.0.0.1:8002/;
    proxy_http_version 1.1;

    # Критически важные заголовки
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Для поддержки WebSocket (signaling)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Отключаем буферизацию для API
    proxy_buffering off;
    proxy_request_buffering off;

    # Таймауты (стандартные для API без AI-запросов)
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
}
